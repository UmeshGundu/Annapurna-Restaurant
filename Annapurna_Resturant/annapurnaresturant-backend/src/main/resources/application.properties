spring.application.name=in

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/annapurna_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Server
server.port=8080
server.address=0.0.0.0

# JWT
app.jwt.secret=AnnapurnaRestaurantSuperSecretKeyForJWT2024AnnapurnaRestaurant
